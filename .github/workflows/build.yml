name: build-windows

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write  # required by softprops/action-gh-release to publish

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pinned deps from lockfile
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          # Per OPTIMIZATION.md §4.4 — install from the committed lock so
          # the build is reproducible across runs. Then install the package
          # itself without re-resolving deps (they're already pinned above).
          pip install -r requirements.lock
          pip install -e . --no-deps

      - name: Build Windows executable
        shell: pwsh
        run: |
          pyinstaller scripts/build_windows.spec --noconfirm --clean

      - name: Smoke-test the built exe (--help)
        shell: pwsh
        run: |
          .\dist\champ-assistant\champ-assistant.exe --help

      - name: Copy .env.example next to the exe
        shell: pwsh
        run: |
          Copy-Item .env.example dist\champ-assistant\.env.example

      - name: Zip bundle for release attachment
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          Compress-Archive -Path dist\champ-assistant\* -DestinationPath champ-assistant-windows.zip -Force

      - name: Upload artifact (non-tag builds only)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: champ-assistant-windows-${{ github.sha }}
          path: dist/champ-assistant/
          retention-days: 30

      - name: Publish GitHub Release on tag push
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: champ-assistant-windows.zip
          generate_release_notes: true
          draft: false
          prerelease: false
          # Static header above the auto-generated changelog. Tells users
          # what to expect on first launch — the bundle is unsigned, so
          # SmartScreen will warn until reputation builds. See README.md
          # "Windows (recommended)" + OPTIMIZATION.md §4.1.
          body: |
            ## First-run notes

            This bundle is **unsigned**. On first launch Windows SmartScreen will
            show _"Windows protected your PC"_ with a **Don't run** button. Click
            **More info → Run anyway** — SmartScreen remembers the choice and won't
            ask again on this machine. Code signing is on the roadmap.

            **Windows Defender exclusion:** add the extracted folder to Defender's
            exclusion list before extracting. Without it, Defender quarantines the
            bundled `python311.dll` and you'll see "Failed to load Python DLL".

            ---
