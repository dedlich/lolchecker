name: nightly soak

# Per OPTIMIZATION.md §4.2 — soak tests are explicitly skipped from the
# default ``pytest`` run (pyproject.toml: ``--ignore=tests/soak``) because
# they take minutes to hours. This workflow runs them on a 6-hour timeout
# every night. Memory leaks and reconnect storms surface here before
# users see them.

on:
  schedule:
    # 03:00 UTC = 04:00 CET in winter, 05:00 in summer. Off-peak.
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  soak:
    runs-on: macos-latest
    timeout-minutes: 360  # 6 hours
    env:
      QT_QPA_PLATFORM: offscreen
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run soak tests
        run: pytest tests/soak -q --tb=short -m soak

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `nightly soak failed (${new Date().toISOString().slice(0,10)})`;
            const body = [
              `Soak run failed on commit ${context.sha}.`,
              ``,
              `Workflow: ${context.workflow}`,
              `Run URL: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `See OPTIMIZATION.md §4.2 for context.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['soak-failure', 'bug'],
            });
