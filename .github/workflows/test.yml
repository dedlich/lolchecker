name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    env:
      # Headless Qt rendering — works on every platform without an X display.
      QT_QPA_PLATFORM: offscreen
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        if: "!(matrix.os == 'macos-latest' && matrix.python == '3.12')"
        run: pytest tests/ -q --tb=short

      - name: Run pytest with coverage (macos-latest + py3.12 only)
        if: matrix.os == 'macos-latest' && matrix.python == '3.12'
        run: pytest tests/ -q --tb=short --cov=champ_assistant --cov-report=term-missing
